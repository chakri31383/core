{% extends 'base.html' %}

{% block content %}

<div class="max-w-6xl mx-auto">

    <!-- HEADER -->
    <div class="mb-6">
        <h2 class="text-3xl font-semibold text-gray-800">Projects</h2>
        <p class="text-gray-500 text-sm">Manage your projects and team members</p>
    </div>

    <!-- CREATE PROJECT -->
    <div class="bg-white border rounded-2xl p-5 shadow-sm mb-6">
        <form id="projectForm" class="flex flex-col md:flex-row gap-3">

            <input id="name" placeholder="Project name"
                class="p-2 border rounded-lg flex-1 focus:ring-2 focus:ring-blue-400">

            <input id="description" placeholder="Short description"
                class="p-2 border rounded-lg flex-1">

            <button
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-lg transition">
                Create
            </button>
        </form>
    </div>

    <!-- PROJECT LIST -->
    <div class="mb-8">
        <h3 class="text-lg font-medium text-gray-700 mb-3">Your Projects</h3>

        <div id="projectList" class="space-y-3"></div>
    </div>

    <!-- ADD MEMBERS -->
    <div class="bg-white border rounded-2xl p-6 shadow-sm">
        <h3 class="text-lg font-medium text-gray-700 mb-4">Add Members</h3>

        <select id="projectSelect"
            class="w-full p-2 border rounded-lg mb-4">
        </select>

        <div id="userList"
            class="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4 text-sm"></div>

        <button id="addBtn"
            class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg transition">
            Add Members
        </button>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        window.location.href = "/login";
        return;
    }

    const projectForm = document.getElementById("projectForm");
    const projectList = document.getElementById("projectList");
    const projectSelect = document.getElementById("projectSelect");
    const userList = document.getElementById("userList");

    async function loadProjects() {
        const res = await fetch("/api/projects/my/", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        projectList.innerHTML = "";
        projectSelect.innerHTML = "";

        data.forEach(p => {
            projectList.innerHTML += `
                <div class="bg-white border p-4 rounded-xl shadow-sm hover:shadow-md transition">
                    <h4 class="font-medium text-gray-800">${p.name}</h4>
                </div>
            `;

            projectSelect.innerHTML += `
                <option value="${p.id}">${p.name}</option>
            `;
        });
    }

    async function loadUsers() {
        const res = await fetch("/api/auth/users/", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        userList.innerHTML = "";

        data.forEach(u => {
            userList.innerHTML += `
                <label class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg cursor-pointer">
                    <input type="checkbox" value="${u.id}">
                    ${u.username}
                </label>
            `;
        });
    }

    projectForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const description = document.getElementById("description").value;

        if (!name || !description) {
            alert("Fill all fields");
            return;
        }

        const res = await fetch("/api/projects/create/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ name, description })
        });

        const data = await res.json();

        if (data.project_id) {
            projectForm.reset();
            loadProjects();
        } else {
            alert(data.error);
        }
    });

    document.getElementById("addBtn").addEventListener("click", async function () {

        const projectId = projectSelect.value;

        const selected = document.querySelectorAll("#userList input:checked");

        let members = [];

        selected.forEach(cb => members.push(parseInt(cb.value)));

        if (members.length === 0) {
            alert("Select users");
            return;
        }

        const res = await fetch(`/api/projects/${projectId}/add-members/`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ members })
        });

        const data = await res.json();

        if (data.message) {
            alert("Members added!");
        } else {
            alert(data.error);
        }
    });

    loadProjects();
    loadUsers();

});
</script>

{% endblock %}
