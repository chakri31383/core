{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2 class="text-2xl font-semibold mb-6">Dashboard Overview</h2>

<div class="grid grid-cols-4 gap-4">

    <div class="bg-white p-5 rounded-xl shadow-sm border text-center">
        <p class="text-gray-500 text-sm">Total Tasks</p>
        <p id="total" class="text-2xl font-bold mt-2">0</p>
    </div>

    <div class="bg-green-50 p-5 rounded-xl border text-center">
        <p class="text-gray-500 text-sm">Completed</p>
        <p id="completed" class="text-2xl font-bold mt-2">0</p>
    </div>

    <div class="bg-yellow-50 p-5 rounded-xl border text-center">
        <p class="text-gray-500 text-sm">Pending</p>
        <p id="pending" class="text-2xl font-bold mt-2">0</p>
    </div>

    <div class="bg-red-50 p-5 rounded-xl border text-center">
        <p class="text-gray-500 text-sm">Overdue</p>
        <p id="overdue" class="text-2xl font-bold mt-2">0</p>
    </div>

</div>

<script>
async function loadDashboard() {
    const res = await fetch("/api/tasks/dashboard/", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await res.json();

    total.innerText = data.total_tasks;
    completed.innerText = data.completed;
    pending.innerText = data.pending;
    overdue.innerText = data.overdue;
}

loadDashboard();
</script>

{% endblock %}
