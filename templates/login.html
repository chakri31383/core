<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-sm border w-96">

    <h2 class="text-2xl font-semibold text-center mb-2">Welcome Back</h2>
    <p class="text-center text-gray-500 text-sm mb-6">Login to continue</p>

    <form id="loginForm" class="space-y-4">

        <input type="text" id="username" placeholder="Username"
            class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">

        <input type="password" id="password" placeholder="Password"
            class="w-full p-2 border rounded-lg">

        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg">
            Login
        </button>
    </form>

    <p class="text-center mt-4 text-sm">
        Don’t have an account?
        <a href="/signup" class="text-blue-600">Signup</a>
    </p>

</div>
<script>
document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/api/auth/login/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    if (data.access_token) {
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("username", data.username);   // ✅ ADD THIS
        window.location.href = "/dashboard";
    } else {
        alert(data.error);
    }
};
</script>

</body>
</html>
