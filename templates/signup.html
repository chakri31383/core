<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-sm border w-96">

    <h2 class="text-2xl font-semibold text-center mb-2">Create Account</h2>
    <p class="text-center text-gray-500 text-sm mb-6">Start your journey</p>

    <form id="signupForm" class="space-y-4">

        <!-- Username -->
        <div>
            <input id="username" placeholder="Username"
                class="w-full p-2 border rounded-lg">
            <p id="usernameError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Full Name -->
        <div>
            <input id="full_name" placeholder="Full Name"
                class="w-full p-2 border rounded-lg">
            <p id="nameError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Email -->
        <div>
            <input id="email" placeholder="Email"
                class="w-full p-2 border rounded-lg">
            <p id="emailError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Password -->
        <div>
            <input type="password" id="password" placeholder="Password"
                class="w-full p-2 border rounded-lg">
            <p id="passwordError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <button id="submitBtn"
            class="w-full bg-green-600 hover:bg-green-700 text-white p-2 rounded-lg">
            Register
        </button>
    </form>

    <p class="text-center mt-4 text-sm">
        Already have an account?
        <a href="/login" class="text-blue-500">Login</a>
    </p>

</div>

<script>
const form = document.getElementById("signupForm");

// 🔹 SHOW ERROR
function showError(id, message) {
    const el = document.getElementById(id);
    el.innerText = message;
    el.classList.remove("hidden");
}

// 🔹 CLEAR ERRORS
function clearErrors() {
    ["usernameError", "nameError", "emailError", "passwordError"]
        .forEach(id => {
            document.getElementById(id).classList.add("hidden");
        });
}

// 🔹 VALIDATION FUNCTION
function validate() {

    clearErrors();

    let valid = true;

    const username = document.getElementById("username").value.trim();
    const name = document.getElementById("full_name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // Username
    if (username.length < 3) {
        showError("usernameError", "Username must be at least 3 characters");
        valid = false;
    }

    // Name
    if (name.length < 3) {
        showError("nameError", "Full name is required");
        valid = false;
    }

    // Email
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showError("emailError", "Enter a valid email");
        valid = false;
    }

    // Password
    if (password.length < 6) {
        showError("passwordError", "Password must be at least 6 characters");
        valid = false;
    }

    return valid;
}

// 🔹 SUBMIT
form.onsubmit = async (e) => {
    e.preventDefault();

    if (!validate()) return;

    const btn = document.getElementById("submitBtn");
    btn.innerText = "Creating...";
    btn.disabled = true;

    const res = await fetch("/api/auth/signup/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            full_name: full_name.value,
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();

    btn.innerText = "Register";
    btn.disabled = false;

    if (data.message) {
        alert("Signup successful 🎉");
        window.location.href = "/login";
    } else {
        alert(data.error);
    }
};
</script>

</body>
</html>
